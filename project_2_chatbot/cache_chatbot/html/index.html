<html>
<head>
    <title>My Chatbot</title>
    <style>
        #main {
            width: 800px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            background-color: #AAAAFF;
            padding-top: 50px;
            padding-bottom: 10px;
            text-align: center;
        }
        #chat-container {
            display: none;
            padding-left: 30px;
            padding-right: 30px;
        }
        #input-panel {
            display: none;
            clear: both;
            width: 100%;
            padding-top: 10px;
            text-align: center;
        }
        input[type='text'] {
            width: 60%;
        }
        input, button {
            height: 60px;
        }
        .human {
            margin-top: 10px;
            margin-bottom: 10px;
            width: 600px;
            float: right;
            clear: both;
            border-radius: 10px;
            background-color: #AAFFAA;
            padding: 10px;
            text-align: right;
        }
        .bot {
            margin-top: 10px;
            margin-bottom: 10px;
            width: 600px;
            float: left;
            clear: both;
            border-radius: 10px;
            background-color: #FFAAAA;
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<div id="main">
    <h1>Welcome to my chat bot</h1>
    <div id="login-panel">
        <form id="login-form">
            <input type="text" id="username" placeholder="Enter your username!">
            <input type="submit" value="Login" id="login-button">
        </form>
    </div>
    <div id="chat-container">
        <div id="chat-panel">
        </div>
        <div style="clear: both"></div>
    </div>
    <div id="input-panel">
        <form id="input-form">
            <input type="text" id="message" placeholder="Say something!">
            <input type="submit" value="Send" id="send-message-button">
        </form>
    </div>
</div>

<script type="text/javascript">
    let username = "";
    document.getElementById('login-form').onsubmit = function () {
        const button = document.getElementById('login-button');
        const box = document.getElementById('username');
        username = box.value;

        // Disable HTML elements.
        button.disabled = true;
        box.disabled = true;

        // Send HTTP request.
        const xhttp = new XMLHttpRequest();
        xhttp.open('POST', 'http://localhost:3000/history', true);
        xhttp.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
        xhttp.onload = function () {
            // Show HTML.
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('chat-container').style.display = 'block';
            document.getElementById('input-panel').style.display = 'block';

            // Parse response.
            const response = this.responseText;
            const messages = JSON.parse(response);

            // Show response in UI.
            const chatPanel = document.getElementById('chat-panel');
            for (let i = 0; i < messages.length; i++) {
                const className = (i % 2 === 0) ? "human" : "bot";
                chatPanel.innerHTML += '<div class="' + className + '">' + messages[i] + '</div>';
            }
        };
        xhttp.onerror = function (error) {
            alert('Error!');
            console.log(error);
        };
        xhttp.send(JSON.stringify({ username: username, message: '' }));
        return false;
    }

    document.getElementById('input-form').onsubmit = function () {
        const button = document.getElementById('send-message-button');
        const messagebox = document.getElementById('message');

        // Disable HTML elements.
        button.disabled = true;
        messagebox.disabled = true;

        // Show changes in UI.
        const message = messagebox.value;
        const payload = {
            username: username,
            message: message
        };
        document.getElementById('chat-panel').innerHTML += '<div class="human">' + message + '</div>';
        document.getElementById('chat-panel').innerHTML += '<div class="bot">...</div>';

        // Send HTTP request.
        const xhttp = new XMLHttpRequest();
        xhttp.open('POST', 'http://localhost:3000/chat', true);
        xhttp.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
        xhttp.onload = function () {
            // Parse response.
            const response = this.responseText;
            const message = JSON.parse(response).message;

            // Enable HTML elements.
            messagebox.disabled = false;
            button.disabled = false;

            // Show response in UI.
            messagebox.value = '';
            const chatPanel = document.getElementById('chat-panel');
            chatPanel.removeChild(chatPanel.lastElementChild);
            chatPanel.innerHTML += '<div class="bot">' + message + '</div>';
        };
        xhttp.onerror = function (error) {
            alert('Error!');
            console.log(error);
        };
        xhttp.send(JSON.stringify(payload));
        return false;
    }
</script>
</html>
